{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blitz — Корма для собак и кошек{% endblock %}</title>
  <style>
    :root {
      --bg-page: #eeebe5;
      --text-main: #1a1a1a;
      --text-muted: #6b6b6b;
      --btn-green: #a8c96c;
      --btn-green-hover: #96b85a;
      --card-green: #c5d8a8;
      --footer-bg: #1a1a1a;
      --border: #dad6ce;
      --radius: 8px;
      --logo-red: #b22222;
      --font: "Oswald", "Arial", sans-serif;
      --font-body: "Inter", sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--text-main);
      background: var(--bg-page);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

    /* ===== ШАПКА ===== */
    .top-bar {
      border-bottom: 1px solid #eeebe5;
      background: #eeebe5;
      position: sticky; top: 0; z-index: 1000;
    }
    .top-bar .container {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; position: relative;
    }
    .top-bar-logo {
      font-family: var(--font); font-size: 22px; font-weight: 900;
      color: var(--logo-red); letter-spacing: 1px; text-transform: uppercase;
    }
    .top-bar-nav { display: flex; align-items: center; gap: 20px; }
    .top-bar-nav a {
      font-family: var(--font); font-size: 12px; font-weight: 600;
      text-transform: uppercase; color: #7e0000; transition: color .3s; white-space: nowrap;
    }
    .top-bar-nav a:hover, .top-bar-nav a.active { color: var(--logo-red); }
    .top-bar-nav .account-link {
      display: flex; align-items: center; gap: 6px; font-weight: 700; color: var(--logo-red);
    }

    /* Бургер */
    .burger-btn {
      display: none; flex-direction: column; justify-content: center; align-items: center;
      width: 36px; height: 36px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 1001;
    }
    .burger-btn span {
      display: block; width: 24px; height: 2.5px; background: #7e0000;
      border-radius: 2px; transition: all 0.3s ease; position: relative;
    }
    .burger-btn span:nth-child(1) { margin-bottom: 5px; }
    .burger-btn span:nth-child(3) { margin-top: 5px; }
    .burger-btn.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger-btn.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .burger-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* Мобильное меню */
    .mobile-menu {
      display: none; position: fixed; top: 0; right: -100%; width: 300px; max-width: 85vw;
      height: 100vh; background: #eeebe5; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      z-index: 999; transition: right 0.35s ease; overflow-y: auto; padding: 70px 24px 24px;
    }
    .mobile-menu.open { right: 0; }
    .mobile-menu a {
      display: block; font-family: var(--font); font-size: 14px; font-weight: 600;
      text-transform: uppercase; color: #7e0000; padding: 14px 0;
      border-bottom: 1px solid var(--border); transition: color 0.2s;
    }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--logo-red); }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu .account-link-mobile {
      margin-top: 16px; padding: 14px 0; border-bottom: none; color: var(--logo-red); font-weight: 700;
    }

    /* Оверлей */
    .menu-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 998; opacity: 0; transition: opacity 0.35s ease;
    }
    .menu-overlay.visible { opacity: 1; }

    @media (max-width: 900px) {
      .container { padding: 0 20px; }
      .top-bar-nav { display: none; }
      .burger-btn { display: flex; }
    }
    @media (max-width: 600px) {
      .top-bar .container { padding: 10px 0; }
      .top-bar-logo { font-size: 18px; }
    }
    @media (max-width: 400px) { .container { padding: 0 12px; } }
    
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include 'header.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'footer.html' %}

  {% block extra_js %}{% endblock %}
</body>
</html>
